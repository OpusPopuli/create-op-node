name: release-please

# release-please opens (or updates) a release PR whenever new Conventional
# Commits land on `main`. Merging that PR creates the git tag, cuts a GitHub
# release, and `publish.yml` fires on the tag push to publish to npm.
#
# Why this exists: PRs #11 (v0.5.0) and #12 (v0.6.0) bumped version in
# package.json but never got tagged, so publish.yml never fired and npm
# stayed pinned at v0.4.0. Automating the tag-and-publish removes that
# manual step.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Use a PAT (RELEASE_PLEASE_TOKEN) when available so the release
          # PR + tag get authored by a real user, not GITHUB_TOKEN. That
          # matters because GitHub deliberately doesn't fire workflows on
          # branches/tags pushed by GITHUB_TOKEN — without a PAT, the
          # release PR's CI doesn't run (release-please PR sits in
          # "Expected — Waiting for status to be reported") and the
          # publish.yml tag-push workflow doesn't fire (npm doesn't get
          # the new version). Both happen automatically once the PAT is
          # in place.
          #
          # See the "Releases" section of README.md for PAT-creation
          # steps. Falls back to GITHUB_TOKEN when the secret isn't set
          # so the workflow still completes (with the manual-republish
          # workarounds you've used before).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
